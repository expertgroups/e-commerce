# Database Configuration
database:
  type: postgresql
  host: localhost
  port: 5432
  name: investment_db
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}
  pool_size: 10
  max_overflow: 20
  echo: false
  pool_pre_ping: true

# API Configuration
api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  timeout: 60
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8501"
  rate_limit:
    requests_per_minute: 60
    burst: 10

# Crawlers Configuration
crawlers:
  codal:
    base_url: "https://codal.ir"
    timeout: 30
    retry_count: 3
    delay_between_requests: 2
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    
  tse:
    base_url: "https://www.tsetmc.com"
    timeout: 30
    retry_count: 3
    use_pytse_client: true
    historical_days: 1825  # 5 years
    
  macro:
    sources:
      - tgju.org
      - cbt.ir  # Central Bank of Iran
    timeout: 30
    retry_count: 3
    update_frequency: daily

# ML Models Configuration
models:
  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.01
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    early_stopping_rounds: 50
    n_jobs: -1
    random_state: 42
    
  lstm:
    sequence_length: 60
    units: [128, 64, 32]
    dropout: 0.2
    recurrent_dropout: 0.2
    batch_size: 32
    epochs: 100
    validation_split: 0.2
    early_stopping_patience: 20
    learning_rate: 0.001
    
  ensemble:
    models:
      - xgboost
      - lightgbm
      - lstm
    voting: soft
    weights: [0.4, 0.3, 0.3]
    
  hyperparameter_tuning:
    enabled: true
    n_trials: 100
    timeout: 3600  # seconds
    study_name: "iis-optimization"
    direction: maximize
    metric: sharpe_ratio

# Portfolio Optimization
portfolio:
  optimization:
    algorithm: genetic
    population_size: 100
    generations: 50
    mutation_rate: 0.1
    crossover_rate: 0.8
    elitism: true
    constraints:
      max_position_weight: 0.20
      min_position_weight: 0.02
      max_sector_weight: 0.40
      min_sharpe: 1.0
    fitness_function: sharpe_ratio
    multi_objective: true
    objectives:
      - maximize_return
      - minimize_risk
      - maximize_sharpe
      
  risk:
    var_confidence_level: 0.95
    cvar_confidence_level: 0.95
    max_drawdown_limit: 0.15
    volatility_target: 0.20
    stress_testing: true
    scenarios:
      - market_crash
      - interest_rate_shock
      - currency_devaluation

# Alerting Configuration
alerting:
  email:
    enabled: false
    smtp_server: smtp.gmail.com
    smtp_port: 587
    sender: alerts@iis.ir
    
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    
  sms:
    enabled: false
    provider: kavehnegar
    
  conditions:
    price_change_threshold: 0.05  # 5%
    volume_spike_threshold: 2.0   # 2x average
    signal_confidence_min: 0.7

# Logging Configuration
logging:
  level: INFO
  format: json
  file: logs/iis.log
  max_size_mb: 100
  backup_count: 10
  console: true
  file: true
  
# Monitoring
monitoring:
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
    port: 3000
  sentry:
    enabled: true
    dsn: ${SENTRY_DSN}
    traces_sample_rate: 0.1

# Cache Configuration
cache:
  type: redis
  url: ${REDIS_URL}
  ttl: 3600  # seconds
  prefix: "iis:"
  
# Feature Engineering
features:
  fundamental:
    ratios:
      - profitability
      - liquidity
      - leverage
      - activity
      - valuation
      - growth
    lookback_years: 5
    
  technical:
    indicators:
      - trend
      - momentum
      - volume
      - volatility
    periods:
      short: [5, 10, 20]
      medium: [50, 100]
      long: [200]
      
  macro:
    variables:
      - usd_rate
      - gold_price
      - market_index
      - inflation_rate
      - interest_rate
