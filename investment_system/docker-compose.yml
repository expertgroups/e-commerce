version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: iis-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-iisuser}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-iispassword}
      POSTGRES_DB: ${DATABASE_NAME:-investment_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-iisuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iis-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: iis-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iis-network

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: iis-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - iis-network

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    container_name: iis-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow-artifacts
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - iis-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iis-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-iisuser}:${DATABASE_PASSWORD:-iispassword}@db:5432/${DATABASE_NAME:-investment_db}
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    networks:
      - iis-network

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iis-dashboard
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
      DATABASE_URL: postgresql://${DATABASE_USER:-iisuser}:${DATABASE_PASSWORD:-iispassword}@db:5432/${DATABASE_NAME:-investment_db}
    volumes:
      - ./dashboard:/app/dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped
    networks:
      - iis-network

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iis-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-iisuser}:${DATABASE_PASSWORD:-iispassword}@db:5432/${DATABASE_NAME:-investment_db}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - db
      - redis
      - rabbitmq
    command: celery -A src.tasks worker --loglevel=info
    restart: unless-stopped
    networks:
      - iis-network

  # Celery Beat (Scheduler)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iis-scheduler
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-iisuser}:${DATABASE_PASSWORD:-iispassword}@db:5432/${DATABASE_NAME:-investment_db}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672//
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
      - rabbitmq
    command: celery -A src.tasks beat --loglevel=info
    restart: unless-stopped
    networks:
      - iis-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: iis-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - iis-network

  # Grafana Visualization
  grafana:
    image: grafana/grafana:10.1.0
    container_name: iis-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - iis-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: iis-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - dashboard
    restart: unless-stopped
    networks:
      - iis-network

networks:
  iis-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
